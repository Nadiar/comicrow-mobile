name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          cache: true

      - run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign
