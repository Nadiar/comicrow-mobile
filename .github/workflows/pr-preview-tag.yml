name: Update PR Preview Tag

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  update-preview-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find open PR for branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { owner, repo } = context.repo;
            const result = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
            });

            if (!result.data.length) {
              core.info(`No open PR found for branch ${branch}. Skipping.`);
              core.setOutput('number', '');
              return;
            }

            const prNumber = String(result.data[0].number);
            core.info(`Found PR #${prNumber} for branch ${branch}`);
            core.setOutput('number', prNumber);

      - name: Create or move preview tag
        if: steps.pr.outputs.number != ''
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          TAG_NAME="pr-${PR_NUMBER}-latest"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$TAG_NAME" -m "Preview tag for PR #${PR_NUMBER}"
          git push origin "$TAG_NAME" --force
